{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>MIMeme</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/adaptive.css' %}">
    <link rel="stylesheet" href="{% static 'css/comments.css' %}">
    <link rel="stylesheet" href="{% static 'css/upload.css' %}">
</head>
<body>
    <div class="page">
        <div class="loader"></div>
        <header class="header">
            <img src="{% static 'img/header.png' %}" alt="" class="header-desgn">
            <nav class="nav">
                <div class="logo-wrap">
                    <a href="{% url 'mim:memes' %}">
                        <img src="{% static 'img/like3.png' %}" alt="" class="logo-head">
                        <p>MIMeme</p>
                    </a>
                </div>
                <div class="tabs-brg">
                    <div class="tabs">
                        <p><a href="{% url 'mim:upload_meme' %}" class="{% if request.path == '/upload/' %}active{% endif %}">Upload</a></p>
                        <p><a href="{% url 'mim:memes' %}" class="{% if request.path == '/' or request.path == '/memes/' %}active{% endif %}">New</a></p>
                        <p><a href="{% url 'mim:top_memes' %}" class="{% if request.path == '/top_memes/' %}active{% endif %}">Top of All Time</a></p>
                        <p><a href="{% url 'mim:trending' %}" class="{% if request.path == '/trending/' %}active{% endif %}">Trending</a></p>
                    </div>
                </div>
                <div class="discord" id="discord-btn">
                    {% if not user.is_authenticated %}
                        <a href="{% url 'social:begin' 'discord' %}"><button style="color: white;">Connect Discord</button></a>
                    {% else %}
                        <p><a href="{% url 'logout' %}" style="color: white; font-weight: 700;">Logout</a></p>
                    {% endif %}
                </div>
                <div class="burger-menu">
                    <span></span>
                </div>
            </nav>
        </header>
        {% block content %}{% endblock %}
    </div>
    <script defer src="{% static 'js/script.js' %}"></script>
</body>
</html>
